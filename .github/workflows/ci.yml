name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: curiosity
          POSTGRES_PASSWORD: curiosity
          POSTGRES_DB: curiosity
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras
      - name: Run unit tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://curiosity:curiosity@localhost:5432/curiosity
        run: uv run pytest tests/unit/ -n auto -x

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json
      - name: Install dependencies
        working-directory: webapp
        run: npm ci
      - name: Run tests
        working-directory: webapp
        run: npm run test:run
